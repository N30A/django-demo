{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'bootstrap/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script defer src="{% static 'bootstrap/bootstrap.bundle.min.js' %}"></script>
    <script defer src="{% static 'js/script.js' %}"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-5">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img id="icon" src="{% static 'images/favicon.ico' %}" alt="Django Demo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Hem</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Uppdrag</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Kartor</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="d-flex flex-column min-vh-100">
        <div class="container flex-grow-1">
            {% block content %}
            {% endblock %}
        </div>
    </main>
    <footer class="container-fluid bg-dark text-white py-3 mt-auto">
        <div class="container text-center">
            &copy; 2026 Django Demo.
        </div>
    </footer>
</body>
</html>
