{% extends "layout.html" %}

{% load static %}

{% block title %}Demo{% endblock %}

{% block content %}
    <div id="hero-content">
        <div id="banner" class="background-fade-container">
            <img src="{% static 'images/background.png' %}" alt="Bakgrund" class="background-fade-image">
        </div>
        <h1 style="text-align: center;">Kodhjältar</h1>
        <div class="hero-list">
            {% for hero in heroes %}
                <div class="card" style="width: 18rem;">
                {% if hero.image_name %}
                    <img src="{% static 'images/' %}{{ hero.image_name }}" class="card-img-top">
                {% else %}
                    <img src="{% static 'images/' %}{{ hero.no_hero }}" class="card-img-top">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ hero.name }}</h5>
                    <p class="card-text">{{ hero.description }}</p>
                </div>
                </div>          
            {% empty %}
                <span>Inga hjältar i listan just nu.</span>
            {% endfor %}
        </div>
    </div>
{% endblock %}
